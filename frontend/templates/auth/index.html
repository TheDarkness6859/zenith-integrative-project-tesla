<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../../static/css/style.css">
</head>
<body class="login-body min-h-screen overflow-hidden">
    <div class="w-full h-screen relative">
        <div class="zorra hidden md:block flex">
            <img src="../../static/assets/img/zorrita 2.svg" alt="">
        </div>

        <div class="flex h-screen">

            <div class="w-full md:w-7/12 lg:w-5/12 xl:w-5/12 flex items-center justify-center login-section cont-left px-6">

                <div class="login-box w-full max-w-md">

                    <h1 class="auth-title text-center leading-normal text-5xl text-white"> Welcome Back! </h1>

                    <p class=" text-1xl text-center leading-normal text-xl mb-16 text-2 "> Login with Your Account </p>

                    <form id="loginForm" class="m-2">

                        <div class="mb-6">
                            <label for="loginEmail" class="text-white block mb-3"> Email </label>
                            <input id="loginEmail" type="email" required pattern="^[^\s@]+@[^\s@]+\.[^\s@]{2,}$" placeholder="Juan@gmail.com" class="w-full bg-transparent border-b border-gray-400 text-white py-2 outline-none">
                        </div>

                        <div class="mb-6">

                            <label for="loginPassword" class="text-white block mb-3"> Password </label>

                            <div class="flex items-center border-b border-gray-400">

                                <input id="loginPassword" type="password" placeholder="Password" class="w-full bg-transparent text-white py-2 outline-none" required>

                                <span id="toggleLoginPassword" class="cursor-pointer pb-2" >
                                    <i class="bi bi-eye-slash text-white" id="loginEyeIcon"></i>
                                </span>

                            </div>
                            
                        </div>

                        <button id="btnLogIn" type="submit" class="btn-join w-full py-3 mb-1 btn-login mt-2 rounded-lg"> Log In </button>
                        <div class="flex items-center my-4">
                            <hr class="flex-grow border-gray-400">
                            <span class="px-3 text-white">or</span>
                            <hr class="flex-grow border-gray-400">
                        </div>
                        <button type="button" id="googleLoginBtn" class="w-full flex items-center justify-center gap-3 bg-white text-black py-3 mb rounded-lg mb-4">
                            <img src="https://developers.google.com/identity/images/g-logo.png" width="20">
                                Log In With Google
                        </button>
                        <div class="text-center small mb-4 mt-2">
                            <p class="text-center small mb-3 text-2">
                                Don't have account?!
                                <a href="../../templates/auth/register.html" class="btn-change border-0 bg-transparent no-underline">Sign Up </a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="card-messages" id="toastMessage"></div>
    <script type="module" src="../../static/js/auth.js"></script>
</body>
</html>
