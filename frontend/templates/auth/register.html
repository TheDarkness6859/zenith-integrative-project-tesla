<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../static/css/style.css">

</head>
<body class="register-body">
    <div class="container-fluid p-0">
        <div class="zorra d-flex"><img src="../../static/assets/img/zorrita 2.svg" alt="" ></div>
        <div class="row vh-100 g-0 ">
            
            <div class="col-12 col-md-6 col-lg-5 col-xl-5 d-flex align-items-center justify-content-center register-section cont-left">
                
                <div class="register-box w-50">
                    
                    <h1 class="mb-3 text-center">Welcome!</h1>
                    <p class="small text-center mb-5 text-2">Register Your New Account!</p>
                    <form id="registerForm">
                        
                        <div class="mb-3">
                            <label for="registerName" class="form-label text-white">User Name</label>
                            <input type="text" placeholder="J. Sebastian. M" class="form-control text-white w-100 bg-transparent border-0 border-bottom rounded-0" id="registerName" required>
                        </div>

                        <div class="mb-3">
                            <label for="registerEmail" class="form-label text-white" >Email Address</label>
                            <input type="email" pattern="^[^\s@]+@[^\s@]+\.[^\s@]{2,}$" placeholder="Juan@gmail.com" class="form-control text-white w-100 bg-transparent border-0 border-bottom rounded-0" id="registerEmail" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="registerPassword" class="form-label text-white">Password</label>

                            <div class="input-group">
                                <input type="password" placeholder="Password" class="form-control  text-white bg-transparent border-0 border-bottom rounded-0" id="registerPassword" required>
                                <span class="input-group-text bg-transparent border-0 border-bottom rounded-0" id="toggleRegisterPassword" style="cursor:pointer;">
                                    <i class="bi bi-eye-slash text-white" id="registerEyeIcon"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="confirmRegisterPassword" class="form-label text-white">Confirm Password</label>

                            <div class="input-group">
                                <input type="password" placeholder="Confirm Password" class="form-control  text-white bg-transparent border-0 border-bottom rounded-0" id="confirmRegisterPassword" required>
                                <span class="input-group-text bg-transparent border-0 border-bottom rounded-0" id="toggleConfirmPassword" style="cursor:pointer;">
                                    <i class="bi bi-eye-slash text-white" id="confirmEyeIcon"></i>
                                </span>
                            </div>
                        </div>


                        <button class="btn btn-join w-100 btn-login mb-2" id="btnRegister" type="submit">
                            Sign Up
                        </button>
                        <div class="text-center small mb-4 mt-3">
                            <p class="text-center small mt-1 text-3 text-white">
                                Thank You for stay here!
                                <a class="border-0 bg-transparent text-decoration-none btn-change" href="../auth/index.html">Sign In</a>
                            </p>
                        </div>
                    </form>
                </div>

            </div>

        </div>
    </div>
    <div id="toastMessage" class="card-messages"></div>
    <script type="module" src="../../static/js/auth.js"></script>
</body>
</html>
