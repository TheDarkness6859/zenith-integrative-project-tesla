<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../../static/css/style.css">
</head>

    <body class="register-body min-h-screen overflow-hidden">

    <div class="w-full h-screen relative">
        <div class="zorra hidden md:block flex">
            <img src="../../static/assets/img/zorrita 2.svg" alt="">
        </div>
        <div class="flex h-screen">
            <div class="w-full md:w-7/12 lg:w-5/12 xl:w-5/12 flex items-center justify-center register-section cont-left px-6">

                <div class="register-box w-full max-w-md">

                    <h1 class="auth-title text-center leading-normal text-white text-5xl"> Welcome!</h1>

                    <p class="text-center leading-normal mb-16 text-xl text-2">Register Your New Account!</p>

                    <form id="registerForm" class="m-2" >

                        <div class="mb-5 ">
                            <label for="registerName" class="text-white block  mb-2">User Name</label>
                            <input id="registerName"type="text"placeholder="J. Sebastian. M" class="w-full bg-transparent border-b border-gray-400 text-white py-2 outline-none" required >
                        </div>

                        <div class="mb-5">
                            <label for="registerEmail" class="text-white block mb-2">Email Address</label>
                            <input id="registerEmail"type="email"pattern="^[^\s@]+@[^\s@]+\.[^\s@]{2,}$"placeholder="Juan@gmail.com"class="w-full bg-transparent border-b border-gray-400 text-white py-2 outline-none" required>
                        </div>

                        <div class="mb-5">

                            <label for="registerPassword" class="text-white block mb-2">Password</label>

                            <div class="flex items-center border-b border-gray-400">

                                <input id="registerPassword"type="password"placeholder="Password"class="w-full bg-transparent text-white py-2 outline-none" required>
                                <span id="toggleRegisterPassword" class="cursor-pointer pb-2">
                                    <i class="bi bi-eye-slash text-white" id="registerEyeIcon"></i>
                                </span>

                            </div>

                        </div>

                        <!-- confirm password -->
                        <div class="mb-6">
                            <label for="confirmRegisterPassword" class="text-white block mb-2">Confirm Password</label>
                            <div class="flex items-center border-b border-gray-400">
                                <input id="confirmRegisterPassword"type="password"placeholder="Confirm Password"class="w-full bg-transparent text-white py-2 outline-none" required>
                                
                                <span id="toggleConfirmPassword" class="cursor-pointer pb-2">
                                    <i class="bi bi-eye-slash text-white" id="confirmEyeIcon"></i>
                                </span>
                            </div>
                        </div>

                        <button id="btnRegister" type="submit" class="btn-join w-full py-3 rounded-lg mb-5 mt-2 btn-login">Sign Up</button>

                        <div class="text-center">

                            <p class=" text-sm text-2 "> 
                                Thank You for stay here!
                                <a href="../auth/index.html" class="btn-change ml-1" >
                                    Sign In
                                </a>
                            </p>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <div id="toastMessage" class="card-messages"></div>

    <script type="module" src="../../static/js/auth.js"></script>

    </body>
</html>
