<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../static/css/style.css">
    <link rel="stylesheet" href="../../static/css/partials.css">
    <link rel="stylesheet" href="../../static/css/dashboard.css">
    <link rel="stylesheet" href="../../static/css/profile.css">
</head>
<body>

    <main class="max-w-6xl mx-auto px-4 pt-10">

        <!-- Header -->
        <header class="mb-8 fade-in">
            <p class="text-xs font-bold uppercase tracking-widest mb-1" style="color:rgba(6,249,249,0.6);">Welcome back</p>
            <h1 class="text-3xl font-bold text-white">Dashboard</h1>
        </header>

        <!-- Cards grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">

            <!-- Profile card -->
            <a href="../../templates/user/profile.html" class="no-underline">
                <div class="dash-card card-profile fade-in" style="animation-delay:0.05s;">
                    <div class="card-top">
                        <i class="bi bi-person-fill" style="color:#06f9f9; font-size:14px;"></i>
                        <span>Profile</span>
                    </div>
                    <div class="card-body-dash" id="preview-profile">
                        <p style="color:rgba(148,163,184,0.4); font-size:13px; text-align:center;">Loading...</p>
                    </div>
                </div>
            </a>

            <!-- Activity card -->
            <a href="../../templates/user/streak.html" class="no-underline">
                <div class="dash-card card-streak fade-in" style="animation-delay:0.1s;">
                    <div class="card-top">
                        <i class="bi bi-fire" style="color:#fb923c; font-size:14px;"></i>
                        <span>Activity</span>
                    </div>
                    <div class="card-body-dash" id="preview-activity">
                        <div style="font-size:3rem; font-weight:900; color:#fb923c; text-align:center; line-height:1; margin-bottom:4px;" id="dash-streak">—</div>
                        <p style="font-size:11px; color:rgba(148,163,184,0.5); text-align:center; margin-bottom:16px;">days in a row</p>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                            <div class="stat-box">
                                <div style="font-size:16px; font-weight:700; color:#fb923c;" id="dash-xp">—</div>
                                <div style="font-size:9px; color:rgba(148,163,184,0.5); margin-top:2px;">XP earned</div>
                            </div>
                            <div class="stat-box">
                                <div style="font-size:11px; font-weight:600; color:#94a3b8;" id="dash-last-session">—</div>
                                <div style="font-size:9px; color:rgba(148,163,184,0.5); margin-top:2px;">Last session</div>
                            </div>
                        </div>
                    </div>
                </div>
            </a>

            <!-- Courses card -->
            <a href="../../templates/user/courses.html" class="no-underline">
                <div class="dash-card card-courses fade-in" style="animation-delay:0.15s;">
                    <div class="card-top">
                        <i class="bi bi-mortarboard-fill" style="color:#34d399; font-size:14px;"></i>
                        <span>My Courses</span>
                    </div>
                    <div class="card-body-dash" id="preview-courses">
                        <p style="color:rgba(148,163,184,0.4); font-size:13px; text-align:center;">Loading...</p>
                    </div>
                </div>
            </a>

        </div>
    </main>

    <script src="../../static/js/dashboard.js"></script>

</body>
</html>
