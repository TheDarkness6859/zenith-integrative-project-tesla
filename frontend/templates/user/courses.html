<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../static/css/courses.css">
    <link rel="stylesheet" href="../../static/css/partials.css">
</head>
<body id="main-Body">
    
    <button id="btn-Create" class="nav-btn bg-white text-black rounded-2xl px-4 py-2 shadow-sm font-medium hover:bg-gray-50 transition-colors inline-flex items-center m-2">
        <i class="bi bi-arrow-left mr-3"></i>Create Course
    </button>

    <button id="btn-Close" class="nav-btn bg-white text-black rounded-2xl px-4 py-2 shadow-sm font-medium hover:bg-gray-50 transition-colors inline-flex items-center m-2">
        <i class="bi bi-grid-fill mr-3"></i>Back
    </button>

    <div id="modal-Wrapper" class="pb-10">

        <div class="card-zenith bg-white fade-in rounded-xl w-[92%] max-w-4xl mx-auto my-10 shadow-lg">
            <div class="card-body p-6 md:p-10">

                <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-6 gap-3">
                    <h1 class="font-bold m-0 text-3xl text-gray-900" id="modal-Title">Create your own course:</h1>
                    <button id="submit-btn" type="submit" class="bg-gray-900 text-white rounded-full px-6 py-2 shadow-sm font-bold transition-all duration-300 hover:bg-gray-800 inline-flex items-center">
                        <i class="bi bi-rocket-takeoff-fill mr-2"></i>Create
                    </button>
                </div>

                <hr class="border-t-2 border-gray-200 opacity-50 mb-6 md:mb-12">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-10 mb-6">

                    <div>
                        <h3 class="font-bold text-gray-900 mb-6 flex items-center text-xl">
                            <i class="bi bi-journal-text mr-2 text-blue-600"></i>General
                        </h3>

                        <div class="mb-4">
                            <label for="title" class="text-sm font-bold block mb-2 text-gray-600">Course Title</label>
                            <input type="text" id="title" class="block w-full px-4 py-3 text-gray-700 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="advanced js" required>
                        </div>

                        <div class="mb-6">
                            <label for="desc" class="text-sm font-bold block mb-2 text-gray-600">Course Description</label>
                            <textarea id="desc" class="block w-full px-4 py-3 text-gray-700 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Tell us what students will learn..." rows="4" required></textarea>
                        </div>
                    </div>

                    <div class="flex flex-col items-center mt-10 md:mt-0">
                        <h3 class="font-bold text-gray-900 mb-6 w-full text-center md:text-left text-xl flex items-center justify-center md:justify-start">
                            <i class="bi bi-layers mr-2 text-blue-600"></i>Modules
                        </h3>

                        <div id="modules-list" class="w-full grow overflow-y-auto pr-2 flex flex-col gap-3 mb-4" style="max-height: 280px; min-height: 180px;">
                            
                        </div>

                        <button id="add-Module" class="border-2 border border-blue-600 text-blue-600 rounded-2xl w-full md:w-3/4 py-2 font-bold transition-colors flex justify-center items-center">
                            <i class="bi bi-plus-circle mr-2"></i>Add new module
                        </button>
                    </div>

                </div>

                <div class="grid grid-cols-1 gap-6 items-end mt-4">
                    
                    <div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="select-Cate" class="text-sm font-bold block mb-2 text-gray-600">Category</label>
                                <select id="select-Cate" class="block w-full px-4 py-3 text-gray-700 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent appearance-none" required>

                                </select>
                            </div>
                            <div>
                                <label for="select-Game" class="text-sm font-bold block mb-2 text-gray-600">Game Mode</label>
                                <select id="select-Game" class="block w-full px-4 py-3 text-gray-700 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent appearance-none" required>

                                </select>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="img-container mb-4 mt-6 w-full aspect-video flex justify-center items-center overflow-hidden rounded-lg bg-gray-50 border border-gray-200" id="preview-Container">
                            <div id="bg-Img-Placeholder" class="flex flex-col items-center justify-center text-gray-400">
                                <i class="bi bi-image text-5xl mb-2"></i>
                                <span class="text-sm">No image selected</span>
                            </div>
                        </div>
                        <input type="text" id="course-cover" class="block w-full px-4 py-3 text-gray-700 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Paste the cover image URL here">
                    </div>

                    <div>
                        <label class="flex justify-center items-center cursor-pointer mt-2">
                            <input type="checkbox" id="course-Public" class="sr-only peer">
                            <div class="relative w-11 h-6 bg-gray-300 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                            <span class="ml-3 text-sm font-bold text-gray-900">Make this course public</span>
                        </label>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <div id="player-container" class="fixed inset-0 z-[7000] opacity-0 pointer-events-none translate-y-[30px] transition-all duration-500 ease-in-out flex items-center justify-center p-4 md:p-8 bg-black/40 backdrop-blur-sm">
        <div class="course-player-card bg-white/5 backdrop-blur-[25px] border border-white/10 rounded-[24px] w-full max-w-[1000px] shadow-[0_30px_60px_-12px_rgba(0,0,0,0.6)] flex flex-col md:flex-row overflow-hidden m-auto">
            
            <!-- SIDEBAR -->
            <div class="w-full md:w-[35%] bg-black/30 p-8 border-r border-white/10 text-white flex flex-col">
                <img id="player-cover" src="" class="w-full aspect-video rounded-xl object-cover mb-6 shadow-[0_10px_20px_rgba(0,0,0,0.4)]" alt="Portada" onerror="this.src='https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&q=80'">
                <h2 id="player-title" class="font-bold text-2xl md:text-3xl mb-2">Título</h2>
                <div class="flex flex-wrap gap-2 mb-4" id="player-badges"></div>
                <p id="player-desc" class="text-white/70 text-sm leading-relaxed">Descripción...</p>
            </div>

            <!-- CONTENT -->
            <div class="w-full md:w-[65%] p-6 md:p-8 flex flex-col gap-6">
                <div>
                    <h4 class="text-white font-bold text-lg mb-4 flex items-center gap-2">
                        <i class="bi bi-book-half text-blue-400"></i> Lecciones
                    </h4>
                    <div id="player-modules" class="flex flex-col gap-2 max-h-[200px] overflow-y-auto custom-scroll pr-2">
                        <!-- Dinámico -->
                    </div>
                </div>

                <!-- ÁREA DE CONTENIDO INTERACTIVO (IFRAME) -->
                <div class="mt-auto bg-black/40 rounded-2xl border border-emerald-500/20 overflow-hidden flex flex-col min-h-[300px]">
                    <div class="flex justify-between items-center p-4 border-b border-emerald-500/10">
                        <h5 class="text-white font-bold m-0 text-sm md:text-base flex items-center gap-2">
                            <i class="bi bi-controller text-emerald-400"></i> Actividad Interactiva
                        </h5>
                        <button class="bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 text-xs py-1 px-4 rounded-full border border-emerald-500/20 transition-colors" onclick="initMiniGame()">Reiniciar</button>
                    </div>
                    <iframe id="game-iframe" src="about:blank" class="w-full flex-grow border-0 bg-black/20" title="Contenido del Curso"></iframe>
                    <div id="game-status" class="text-emerald-400 font-bold text-[10px] text-center p-1 bg-black/20"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script type="module" src="../../static/js/partials.js" ></script>
    <script type="module">
        import { loadPartial } from "../../static/js/partials.js";

        document.addEventListener('DOMContentLoaded', async () => {
            await loadPartial('footer-container', "../partials/navbar.html");
        });
    </script>

    <script type="module" src="../../static/js/courses.js"></script>
</body>
</html>
