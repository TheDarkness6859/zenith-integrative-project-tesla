<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../static/css/style.css"> 
    <link rel="stylesheet" href="/css/style.css">

</head>
<body style="background-color: rgb(232,228, 222, 0.662);">
  <div id="footer"> </div>
    <main class="page">
      <section class="profile">
        <button class="profile-edit" type="button" id="edit_profile">Edit Profile</button>
        <div class="avatar-box">
          <label class="avatar" for="avatarInput" id="avatar_profile">AC</label>
          <input id="avatarInput" class="file" type="file" accept="image/*" />
        </div>
        <div class="profile-info">
          <div class="name-row">
            <h1 id="name_profile"> </h1>
            <span class="chip" id="rol_profile"></span>
          </div>
          <p id="description_profile">
           
          </p>
          <div class="stats">
            <div>
              <span class="label" >Global Rank</span>
              <span class="value" id="rank"></span>
            </div>
            <div>
              <span class="label">Total Points</span>
              <span class="value" id="points"></span>
            </div>
            <div>
              <span class="label">Achievements</span>
              <span class="value" id="achievements"></span>
            </div>
            <div>
              <span class="label">Contribution Streak</span>
              <span class="value" id="streak"></span>
            </div>
          </div>
        </div>
      </section>

      <section class="grid">
        <div class="trophy-head">
          <div class="trophy-icon">
            <i class="bi bi-award"></i>
          </div>
          <h2>Featured Trophy</h2>
        </div>
        <article class="card trophy">
          <div class="trophy-body">
            <div>
              <div class="trophy-desc">
                <div class="trophy-badge-wrap">
                  <i class="trophy-badge bi bi-award" id="insignia"></i>
                </div>
                <div class="trophy-content">
                  <span class="kicker">Legendary Achievement</span>
                  <h3></h3>
                  <p class="text">
                   
                  <div class="tags">
                    <span class="tag-label">Earned On</span>
                    <span class="tag-label">Rarity</span>
                    <span class="tag-label">Points Gained</span>
                  </div>
                  <div class="tags values">
                    <span class="tag-value"></span>
                    <span class="tag-value"></span>
                    <span class="tag-value"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </article>

        <article class="card activity">
          <h2>Recent Activity</h2>
          <ul class="list">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
          </ul>
        </article>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Earned Badges</h2>
          <button class="link" type="button">View All Badges</button>
        </div>
        <div class="badges" id="badgeGrid">
          <div class="badge" data-badge="HTML Master" id="cat_insignia">
            <span class="badge-icon">
              <i class="bi bi-terminal" id="img_insignia"></i>
            </span>
            <p id="name_insignia">HTML Master</p>
            <small id="description_insignia">Tier 5 Complete</small>
          </div>
          
         
      </section>
    </main>
    <div id="footer"></div>
    <script src="../../static/js/profile.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
