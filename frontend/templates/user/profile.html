
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../static/css/style.css">
    <link rel="stylesheet" href="../../static/css/profile.css">
</head>
<body class="b">
    <main class="page" id="profileView">
        <section class="profile">
            <button class="profile-edit" type="checkbox" id="edit_profile">Edit Profile</button>
            <div class="avatar-box">
                <label class="avatar" >
                    <img id="main_avatar_img" src="" style="display:none; width:100%; height:100%; border-radius:10%; object-fit:cover;">
                    <span id="avatar_profile">AC</span>
                </label>
        </div>
        <div class="profile-info">
          <div class="name-row">
            <h1 id="name_profile" class="text-white"> </h1>
            <span class="chip text-white" id="rol_profile"></span>
          </div>
          <p id="description_profile" class="text-white">
            
          </p>
          <div class="stats">
            <div>
              <span class="label text-white" >Phone</span>
              <span class="value" id="phone"></span>
            </div>
            <div>
              <span class="label text-white">Country</span>
              <span class="value " id="country"></span>
            </div>
            <div>
              <span class="label text-white">Achievements</span>
              <span class="value text-white" id="achievements"></span>
            </div>
            <div>
              <span class="label text-white">Total Points</span>
              <span class="value text-white" id="points"></span>
            </div>
          </div>
        </div>
      </section>



        <section class="grid">
            <div class="trophy-head">
                <div class="trophy-icon">
                    <i class="bi bi-award"></i>
                </div>
                <h2 class="text-white">Featured Trophy</h2>
            </div>
            <article class="card trophy">
                <div class="trophy-body">
                    <div>
                        <div class="trophy-desc">
                            <div class="trophy-badge-wrap">
                                <i class="trophy-badge  bi bi-award insignia" id="insignia"></i>
                            </div>
                            <div class="trophy-content">
                                <span class="kicker mt-3">Legendary Achievement</span>
                                    <h3 id="name_insignia" class="name-insignia text-white" ></h3>
                                        <p class="text">
                                        </p>
                                    <div class="tags">
                                        <span class="tag-label">Earned On</span>
                                        <span class="tag-label">Rarity</span>
                                        <span class="tag-label">Points Gained</span>
                                    </div>
                                    <div class="tags values">
                                        <span class="tag-value"></span>
                                        <span class="tag-value"></span>
                                        <span class="tag-value"></span>
                                    </div>
                            </div>
                        </div>
                    </div>
                </div>
            </article>

        <article class="card activity">
          <h2 class="text-white">Recent Activity</h2>
          <ul class="list text-white" id="activityList">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
          </ul>
        </article>
      </section>

      <section class="card">
        <div class="card-head">
          <h2 class="text-white">Earned Badges</h2>
          <button class="link" type="button">View All Badges</button>
        </div>
        <div class="badges" id="badgeGrid">
          <div class="badge" data-badge="HTML Master" id="cat_insignia">
            <span class="badge-icon">
              <i class="bi bi-terminal" id="img_insignia"></i>
            </span>
            <p id="name_insignia " class="text-white">HTML Master</p>
            <small id="description_insignia" class="text-white">Tier 5 Complete</small>
          </div>
          
         
      </section>
    </main>
    <section id="editSection" style="display: none;" class="edit-profile-body py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8">
                    <div class="register-box p-4 cont-left rounded-4" style="background: rgba(255, 255, 255, 0.05);">
                        <h1 class="mb-3 text-center text-white">Edit Profile</h1>
                        <form id="editProfileForm">
                          <div class="mb-3">
                              <label class="text-white">Full Name</label>
                              <input type="text" id="edit_name" class="form-control bg-transparent text-white border-0 border-bottom rounded-0 " required>
                          </div>
                          <div class="mb-3">
                              <label class="text-white">Email</label>
                              <input type="email" id="edit_email" class="form-control bg-transparent text-white border-0 border-bottom rounded-0" required>
                          </div>

                            <div class="mb-3">
                                <label class="text-white">Description</label>
                                <textarea id="edit_description" class="form-control bg-transparent text-white border-0 border-bottom rounded-0" rows="3"></textarea>
                            </div>

                          <div class="row">
                              <div class="col-md-6 mb-3">
                                  <label class="text-white">Rol</label> <input type="text" id="edit_lenguage" class="form-control bg-transparent text-white border-0 border-bottom rounded-0">
                              </div>
                              <div class="col-md-6 mb-3">
                                  <label class="text-white">Phone</label>
                                  <input type="text" id="edit_phone" class="form-control bg-transparent text-white border-0 border-bottom rounded-0">
                              </div>
                          </div>

                          <div class="mb-3">
                              <label class="text-white">Country</label>
                              <input type="text" id="edit_country" class="form-control bg-transparent text-white border-0 border-bottom rounded-0">
                          </div>

                            <div class="mb-4">
                                <label class="form-label text-white">Profile photo</label>
                                <div class="avatar-box ">
                                  <label class="avatar" for="edit_photo">
                                    <img id="edit_avatar_preview" src="" style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
                                    <span id="edit_avatar_text">PF</span>
                                  </label> 
                                  <input id="edit_photo" for ="avatar_profile"class="file" type="file" accept="image/*" />
                                </div>
                            </div>

                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-primary flex-grow-1">Save Changes</button>
                                <button type="button" id="cancelEdit" class="btn btn-outline-light flex-grow-1">Cancel</button>
                            </div>
                        </form>
                  </div>
              </div>
          </div>
      </section>
      <div id="footer"></div>
      <script type="module" src="../../static/js/profile.js"></script>
      <script type="module" src="../../static/js/navbar.js"></script>
  </body>
</html>
