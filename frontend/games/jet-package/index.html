<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jet Package</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-ui">
        <div class="ui-left">
            <div class="ui-label">Altitud Máxima</div>
            <div id="altitude-display">0m</div>
            <div class="bar-container"><div id="fuel-bar"></div></div>
            <div class="ui-label" style="margin-top:4px;">Combustible</div>
        </div>
        <div class="ui-right">
            <div class="ui-label">Puntuación</div>
            <div id="score-val">0</div>
        </div>
    </div>

    <div id="quiz-modal">
        <div class="modal-tag">¡ALERTA DE SEGURIDAD!</div>
        <h2 id="question-text">Pregunta Crítica</h2>
        <div id="options-container"></div>
    </div>

    <div id="game-over-modal">
        <div class="modal-title">¡MISIÓN FALLIDA!</div>
        <div class="modal-stats">
            <div class="ui-label">Altitud Alcanzada</div>
            <div id="final-alt">0m</div>
            <div class="ui-label" style="margin-top:12px;">Puntaje Total</div>
            <div id="final-score">0</div>
        </div>
        <button class="action-btn" onclick="resetGame()">REINTENTAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
