<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevType Defender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="ui-top">
            <div>
                <h2>Type-Zenith</h2>
                <p>Type to destroy bugs and dependencies</p>
            </div>
            <div>Points: <span id="scoreDisplay">0</span></div>
        </div>
    </div>

    <div id="menu-screen">
        <div class="menu-box">
            <h2 id="menu-title">DEVTYPE</h2>
            <p id="menu-desc">Defend your server. Type the words to shoot.</p>
            <div id="final-score-container">
                <p>Final Score</p>
                <p id="final-score">0</p>
            </div>
            <button id="start-btn">Play</button>
        </div>
    </div>

    <input type="text" id="mobile-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <script src="script.js"></script>
</body>
</html>
