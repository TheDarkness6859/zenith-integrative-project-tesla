<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Crush</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1>CODE CRUSH</h1>
        <div id="score-display">PUNTOS: <span id="score">0</span></div>
        <div id="penalty-text">¡HAZ UN MATCH O EL SISTEMA COLAPSA!</div>
    </div>
 
    <div id="penalty-bar-container">
        <div id="penalty-bar-fill"></div>
    </div>
 
    <div id="game-container">
        <div id="grid"></div>

        <div id="quiz-overlay">
            <div id="lang-badge">LENGUAJE</div>
            <h2 id="quiz-question">Pregunta de programación</h2>
            <div id="quiz-options"></div>
        </div>

        <div id="game-over-screen">
            <h2>SISTEMA CAÍDO</h2>
            <p id="death-reason">Tiempo de gracia agotado</p>
            <div id="final-score-box">
                <p class="label">Puntaje Final</p>
                <p id="final-score">0</p>
            </div>
            <button onclick="resetGame()">REINTENTAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
